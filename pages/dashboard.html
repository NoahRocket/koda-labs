<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Koda Compass</title>
  <link rel="stylesheet" href="../styles/main.css">
  <link rel="stylesheet" href="../styles/dashboard.css">
  <link rel="stylesheet" href="../styles/notes.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body style="background-color: #f8f9fa; display: flex; min-height: 100vh;">
  <div class="hamburger">
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
  </div>
  <nav style="position: fixed; top: 0; left: 0; width: 80px; height: 100vh; background: linear-gradient(180deg, #e9f1fa 0%, #d9e4f5 100%); display: flex; flex-direction: column; align-items: center; padding: 2rem 0; box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);">
    <span class="close-btn">&times;</span>
    <div class="nav-items" id="loggedInNav" style="display: none;">
      <a href="/pages/dashboard.html" class="active"><i class="fas fa-home"></i><span>Home</span></a>
      <a href="/pages/chat.html"><i class="fas fa-comments"></i><span>Chat</span></a>
      <a href="#" id="notesToggle"><i class="fas fa-sticky-note"></i><span>Notes</span></a>
      <a href="/pages/bookmarks.html"><i class="fas fa-bookmark"></i><span>Bookmarks</span></a>
      <a href="/pages/settings.html"><i class="fas fa-cog"></i><span>Settings</span></a>
      <a href="#" id="logout"><i class="fas fa-sign-out-alt"></i><span>Log Out</span></a>
    </div>
    <div class="nav-items" id="loggedOutNav">
      <a href="/" class="active"><i class="fas fa-home"></i><span>Home</span></a>
      <a href="/pages/login.html"><i class="fas fa-sign-in-alt"></i><span>Log In</span></a>
      <a href="/pages/signup.html"><i class="fas fa-user-plus"></i><span>Sign Up</span></a>
    </div>
  </nav>
  <div class="main-content">
    <div class="dashboard-header">
      <h1>Welcome Back!</h1>
      <p>Here are your conversation topics</p>
      <button class="btn-primary" id="showAddTopicModal">
        <i class="fas fa-plus"></i> New Topic
      </button>
  </div>
    <div class="topics-grid" id="topicsGrid">
      <!-- Topics will be loaded here -->
      <div class="loading-spinner" id="topicsLoading">
        <div class="spinner">
          <div class="spinner-needle"></div>
          <div class="spinner-center"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Topic Details Modal -->
  <div class="modal" id="topicModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTopicName">Topic Name</h2>
        <button class="close-modal" id="closeTopicModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-tabs">
          <button class="tab-btn active" data-tab="conversations">
            <i class="fas fa-comment"></i> Conversations
          </button>
          <button class="tab-btn" data-tab="bookmarks">
            <i class="fas fa-bookmark"></i> Bookmarks
          </button>
          <button class="tab-btn" data-tab="notes">
            <i class="fas fa-sticky-note"></i> Notes
          </button>
          <button class="tab-btn" data-tab="summary">
            <i class="fas fa-magic"></i> Summary
          </button>
        </div>

        <div class="tab-content active" id="conversationsTab">
          <div class="section-header">
            <h3>Conversations</h3>
          </div>
          <div class="conversations-list" id="conversationsList">
            <div class="loading-spinner">
              <div class="spinner">
                <div class="spinner-needle"></div>
                <div class="spinner-center"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="tab-content" id="bookmarksTab">
          <div class="section-header">
            <h3>Bookmarks</h3>
          </div>
          <div class="bookmarks-list" id="bookmarksList">
            <div class="loading-spinner">
              <div class="spinner">
                <div class="spinner-needle"></div>
                <div class="spinner-center"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="tab-content" id="notesTab">
          <div class="section-header">
            <h3>Notes</h3>
          </div>
          <div class="notes-list" id="topicNotesList">
            <div class="loading-spinner">
              <div class="spinner">
                <div class="spinner-needle"></div>
                <div class="spinner-center"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="tab-content" id="summaryTab">
          <div class="section-header">
            <h3>Topic Summary</h3>
            <button class="btn-primary" id="generateSummaryBtn">
              <i class="fas fa-magic"></i> Generate Summary
            </button>
          </div>
          <div class="summary-content" id="summaryContent">
            <div class="loading-spinner">
              <div class="spinner">
                <div class="spinner-needle"></div>
                <div class="spinner-center"></div>
              </div>
            </div>
          </div>
          <div id="summaryLoading" style="display: none;">
            <div class="spinner">
              <div class="spinner-needle"></div>
              <div class="spinner-center"></div>
            </div>
            <p>Generating summary...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Notes Panel -->
  <div id="notesPanel" class="notes-panel">
    <div class="notes-header">
      <h2><i class="fas fa-sticky-note"></i> Quick Notes</h2>
      <button class="close-notes">&times;</button>
    </div>
    <div class="notes-content">
      <div class="notes-form">
        <textarea id="noteText" placeholder="Jot down a thought..."></textarea>
        <div class="notes-controls">
          <select id="noteTopic">
            <option value="">Untagged</option>
            <!-- Topics will be loaded here -->
          </select>
          <button id="saveNote" class="save-note-btn">
            <i class="fas fa-save"></i> Save
          </button>
        </div>
      </div>
      <div class="notes-list-header">
        <h3>Saved Notes</h3>
        <select id="noteFilter">
          <option value="all">All Notes</option>
          <option value="untagged">Untagged</option>
          <!-- Topics will be loaded here -->
        </select>
      </div>
      <div id="notesList" class="notes-list">
        <!-- Notes will be loaded here -->
      </div>
    </div>
  </div>
  
  <!-- Audio for success sound -->
  <audio id="saveSuccessSound" preload="auto" src="../sounds/success-chime.mp3"></audio>

  <script>
    // Check if user is logged in
    const userId = localStorage.getItem('userId');
    const accessToken = localStorage.getItem('accessToken');

    // Check login status and update navigation
    function updateNavigation() {
      const isLoggedIn = userId && accessToken;
      const loggedInNav = document.getElementById('loggedInNav');
      const loggedOutNav = document.getElementById('loggedOutNav');
      
      if (isLoggedIn) {
        loggedInNav.style.display = 'block';
        loggedOutNav.style.display = 'none';
      } else {
        loggedInNav.style.display = 'none';
        loggedOutNav.style.display = 'block';
        // Redirect to login page if not logged in
        window.location.href = '/pages/login.html';
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      updateNavigation();
      loadTopics();
      
      // Mobile menu functionality
    const hamburger = document.querySelector('.hamburger');
    const nav = document.querySelector('nav');
    const closeBtn = document.querySelector('.close-btn');

    hamburger.addEventListener('click', () => {
      nav.classList.toggle('active');
    });

    closeBtn.addEventListener('click', () => {
      nav.classList.remove('active');
    });

      // Logout functionality
      document.getElementById('logout').addEventListener('click', () => {
        localStorage.removeItem('userId');
        localStorage.removeItem('accessToken');
        window.location.href = '/';
      });
      
      // Setup Add Topic Modal functionality
      const addTopicModal = document.getElementById('addTopicModal');
      const closeAddTopicModal = document.querySelector('#addTopicModal .close-modal');
      const addTopicForm = document.getElementById('addTopicForm');
      const showAddTopicModalBtn = document.getElementById('showAddTopicModal');
      
      if (showAddTopicModalBtn) {
        showAddTopicModalBtn.addEventListener('click', () => {
          if (addTopicModal) {
            addTopicModal.classList.add('active');
            document.getElementById('newTopicName').focus();
          }
        });
      }
      
      if (closeAddTopicModal) {
        closeAddTopicModal.addEventListener('click', () => {
          addTopicModal.classList.remove('active');
        });
      }
      
      if (addTopicForm) {
        addTopicForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          
          const topicName = document.getElementById('newTopicName').value.trim();
          if (!topicName) return;
          
          const submitButton = addTopicForm.querySelector('button[type="submit"]');
          const originalText = submitButton.textContent;
          
          // Show loading state
          submitButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
          submitButton.disabled = true;

    const userId = localStorage.getItem('userId');
    const accessToken = localStorage.getItem('accessToken');

      try {
            const response = await fetch('/.netlify/functions/dashboard', {
          method: 'POST',
              body: JSON.stringify({
                action: 'addTopic',
                userId,
                name: topicName
              }),
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${accessToken}`
          }
        });
            
            const result = await response.json();
            
            if (response.ok) {
              // Success animation
              submitButton.innerHTML = '<i class="fas fa-check"></i>';
              submitButton.classList.add('success');
              
              setTimeout(() => {
                addTopicModal.classList.remove('active');
                submitButton.textContent = originalText;
                submitButton.classList.remove('success');
                submitButton.disabled = false;
              
                // Show success toast
                showToast('Topic created successfully!', 'success');
                
                // Reload topics with animation
                loadTopics();
              }, 1000);
            } else {
              submitButton.textContent = originalText;
              submitButton.disabled = false;
              showToast('Failed to create topic: ' + result.error, 'error');
            }
      } catch (error) {
            console.error('Error creating topic:', error);
            submitButton.textContent = originalText;
            submitButton.disabled = false;
            showToast('Error connecting to server. Please try again.', 'error');
          }
        });
      }
      
      // Notes toggle functionality
      const notesToggle = document.getElementById('notesToggle');
      const notesPanel = document.getElementById('notesPanel');
      const closeNotes = document.querySelector('.close-notes');
      
      if (notesToggle && notesPanel && closeNotes) {
        notesToggle.addEventListener('click', (e) => {
          e.preventDefault();
          notesPanel.classList.toggle('active');
          if (notesPanel.classList.contains('active')) {
            loadNotesTopics();
            loadNotes();
          }
        });
        
        closeNotes.addEventListener('click', () => {
          notesPanel.classList.remove('active');
        });
      }
      
      // Set up save note functionality
      const saveNoteBtn = document.getElementById('saveNote');
      if (saveNoteBtn) {
        saveNoteBtn.addEventListener('click', saveNote);
      }
      
      // Set up note filter change event
      const noteFilter = document.getElementById('noteFilter');
      if (noteFilter) {
        noteFilter.addEventListener('change', loadNotes);
      }

      // Modal functionality
      const modal = document.getElementById('topicModal');
      const closeModal = document.querySelector('.close-modal');
      
      if (modal && closeModal) {
        closeModal.addEventListener('click', () => {
          // Add exit animation
          const modalContent = document.querySelector('.modal-content');
          modalContent.classList.add('animate-fade-out');
          
          setTimeout(() => {
            modal.classList.remove('active');
            modalContent.classList.remove('animate-fade-out', 'animate-scale');
          }, 300);
        });

        window.addEventListener('click', (e) => {
          if (e.target === modal) {
            closeModal.click();
          }
        });
      }

      // Delete topic button
      const deleteTopicBtn = document.getElementById('deleteTopic');
      if (deleteTopicBtn) {
        deleteTopicBtn.addEventListener('click', async () => {
          if (!currentTopicId) return;
          
          // Show confirmation with animation
          const deleteButton = document.getElementById('deleteTopic');
          const originalText = deleteButton.innerHTML;
          
          deleteButton.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Confirm Delete?';
          deleteButton.classList.add('confirm-delete');
          
          // Create cancel option
          const cancelButton = document.createElement('button');
          cancelButton.className = 'btn-secondary cancel-delete animate-fade-in';
          cancelButton.innerHTML = 'Cancel';
          deleteButton.parentNode.insertBefore(cancelButton, deleteButton.nextSibling);
          
          // Handle cancel
          cancelButton.addEventListener('click', () => {
            deleteButton.innerHTML = originalText;
            deleteButton.classList.remove('confirm-delete');
            cancelButton.classList.add('animate-fade-out');
            setTimeout(() => cancelButton.remove(), 300);
          });
          
          // Handle confirmation
          function handleDeleteConfirm() {
            // Remove listeners
            deleteButton.removeEventListener('click', handleDeleteConfirm);
            
            // Show loading state
            deleteButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Deleting...';
            deleteButton.disabled = true;
            cancelButton.remove();
            
            deleteTopic(currentTopicId);
          }
          
          // Add confirmation listener
          deleteButton.addEventListener('click', handleDeleteConfirm);
        });
      }
    });

    // Define currentTopicId at the top level
    let currentTopicId = null;

    // Load topics with staggered animation
    async function loadTopics() {
      const topicsGrid = document.getElementById('topicsGrid');
      const topicsLoading = document.getElementById('topicsLoading');
      
      if (!topicsGrid) return;
      
      // Show loading spinner
      if (topicsLoading) {
        topicsLoading.style.display = 'flex';
      }
      
      // Clear existing topics except for loading spinner
      Array.from(topicsGrid.children).forEach(child => {
        if (!child.id || child.id !== 'topicsLoading') {
          child.remove();
        }
      });
      
      const userId = localStorage.getItem('userId');
      const accessToken = localStorage.getItem('accessToken');
      
      if (!userId || !accessToken) {
        if (topicsLoading) {
          topicsLoading.style.display = 'none';
        }
        window.location.href = '/';
        return;
      }
      
      try {
        console.log("Fetching topics...");
        const response = await fetch('/.netlify/functions/dashboard', {
          method: 'POST',
          body: JSON.stringify({
            action: 'getTopics',
            userId
          }),
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${accessToken}`
          }
        });
        
        const result = await response.json();
        console.log("Response received:", result);
        
        // Always hide loading spinner, regardless of response
        if (topicsLoading) {
          topicsLoading.style.display = 'none';
        }
        
        if (!response.ok) {
          showToast('Failed to load topics: ' + result.error, 'error');
          
          // Show empty state
          const emptyState = document.createElement('div');
          emptyState.className = 'empty-state';
          emptyState.innerHTML = `
            <i class="fas fa-exclamation-circle"></i>
            <h3>Error Loading Topics</h3>
            <p>There was a problem loading your topics. Please try again.</p>
          `;
          topicsGrid.appendChild(emptyState);
          return;
        }
        
        const topics = result.topics || [];
        
        if (topics.length === 0) {
          // Show empty state
          const emptyState = document.createElement('div');
          emptyState.className = 'empty-state';
          emptyState.innerHTML = `
            <i class="fas fa-book"></i>
            <h3>No Topics Yet</h3>
            <p>Create your first topic to get started!</p>
            <button class="btn-primary" id="createFirstTopic">
              <i class="fas fa-plus"></i> Create Topic
            </button>
          `;
          topicsGrid.appendChild(emptyState);
          
          // Add event listener to the "Create Topic" button in empty state
          document.getElementById('createFirstTopic').addEventListener('click', () => {
            document.getElementById('addTopicModal').classList.add('active');
          });
          return;
        }
        
        // Display topics
          topics.forEach(topic => {
          const topicCard = document.createElement('div');
          topicCard.className = 'topic-card animate-fade-in';
          topicCard.dataset.id = topic.id;
          
          topicCard.innerHTML = `
            <div class="topic-header">
              <h3>${topic.name}</h3>
              <div class="topic-actions">
                <button class="icon-btn delete-topic" title="Delete Topic">
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </div>
            <div class="topic-meta">
              <span><i class="fas fa-comment"></i> ${topic.conversation_count || 0}</span>
              <span><i class="fas fa-bookmark"></i> ${topic.bookmark_count || 0}</span>
              <span><i class="fas fa-sticky-note"></i> ${topic.note_count || 0}</span>
            </div>
            <button class="view-topic-btn">View Details</button>
          `;
          
          topicsGrid.appendChild(topicCard);
          
          // Add staggered animation
          setTimeout(() => {
            topicCard.classList.add('visible');
          }, 50 * topicsGrid.children.length);
          
          // Add click event for viewing topic details
          topicCard.querySelector('.view-topic-btn').addEventListener('click', () => {
            openTopicModal(topic.id);
          });
          
          // Add click event for deleting topic
          topicCard.querySelector('.delete-topic').addEventListener('click', async (e) => {
            e.stopPropagation();
            if (confirm(`Are you sure you want to delete "${topic.name}"? This action cannot be undone.`)) {
              await deleteTopic(topic.id);
            }
          });
        });
        
      } catch (error) {
        console.error('Error loading topics:', error);
        
        // Always hide loading spinner
        if (topicsLoading) {
          topicsLoading.style.display = 'none';
        }
        
        showToast('Error connecting to server. Please try again.', 'error');
        
        // Show empty state with error
        const emptyState = document.createElement('div');
        emptyState.className = 'empty-state';
        emptyState.innerHTML = `
          <i class="fas fa-exclamation-circle"></i>
          <h3>Connection Error</h3>
          <p>We couldn't connect to the server. Please check your internet connection and try again.</p>
        `;
        topicsGrid.appendChild(emptyState);
      }
    }

    // Load topic details with animation
    async function loadTopicDetails(topicId) {
      const userId = localStorage.getItem('userId');
      const accessToken = localStorage.getItem('accessToken');
      
      // Show skeleton loading state
      document.getElementById('conversationsList').innerHTML = `
        <div class="skeleton-loader">
          <div class="skeleton-item"></div>
          <div class="skeleton-item"></div>
          <div class="skeleton-item"></div>
        </div>
      `;
      
      document.getElementById('bookmarksList').innerHTML = `
        <div class="skeleton-loader">
          <div class="skeleton-item"></div>
          <div class="skeleton-item"></div>
        </div>
      `;
      
      try {
        const response = await fetch('/.netlify/functions/dashboard', {
              method: 'POST',
          body: JSON.stringify({
            action: 'getTopicDetails',
            userId,
            topicId
          }),
              headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${accessToken}`
              }
            });
        
        const result = await response.json();
        
            if (response.ok) {
          // Populate conversations with animation
          const conversationsContainer = document.getElementById('conversationsList');
          conversationsContainer.innerHTML = '';
          
          if (result.conversations && result.conversations.length > 0) {
            result.conversations.forEach((conversation, index) => {
              const conversationItem = document.createElement('div');
              conversationItem.className = 'conversation-item';
              conversationItem.style.opacity = '0';
              conversationItem.innerHTML = `
                <div class="conversation-header">
                  <span class="conversation-date">${new Date(conversation.created_at).toLocaleDateString()}</span>
                </div>
                <div class="conversation-content">
                  <p>${conversation.content}</p>
                </div>
              `;
              conversationsContainer.appendChild(conversationItem);
              
              // Staggered animation
              setTimeout(() => {
                conversationItem.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                conversationItem.style.opacity = '1';
              }, 50 * index);
            });
            } else {
            conversationsContainer.innerHTML = '<p class="empty-message animate-fade-in">No conversations yet.</p>';
          }
          
          // Populate bookmarks with animation
          const bookmarksContainer = document.getElementById('bookmarksList');
          bookmarksContainer.innerHTML = '';
          
          if (result.bookmarks && result.bookmarks.length > 0) {
            result.bookmarks.forEach((bookmark, index) => {
              const bookmarkItem = document.createElement('div');
              bookmarkItem.className = 'bookmark-item';
              bookmarkItem.style.opacity = '0';
              bookmarkItem.innerHTML = `
                <div class="bookmark-header">
                  <span class="bookmark-date">${new Date(bookmark.created_at).toLocaleDateString()}</span>
                </div>
                <div class="bookmark-content">
                  <a href="${bookmark.url}" target="_blank" class="bookmark-link">
                    <i class="fas fa-external-link-alt"></i> ${bookmark.url}
                  </a>
                </div>
              `;
              bookmarksContainer.appendChild(bookmarkItem);
              
              // Staggered animation
              setTimeout(() => {
                bookmarkItem.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                bookmarkItem.style.opacity = '1';
              }, 50 * index);
            });
          } else {
            bookmarksContainer.innerHTML = '<p class="empty-message animate-fade-in">No bookmarks yet.</p>';
          }
        } else {
          document.getElementById('conversationsList').innerHTML = '<p class="error-message">Failed to load conversations.</p>';
          document.getElementById('bookmarksList').innerHTML = '<p class="error-message">Failed to load bookmarks.</p>';
        }
      } catch (error) {
        console.error('Error loading topic details:', error);
        document.getElementById('conversationsList').innerHTML = '<p class="error-message">Error connecting to server.</p>';
        document.getElementById('bookmarksList').innerHTML = '<p class="error-message">Error connecting to server.</p>';
      }
    }

    // Delete topic implementation
    async function deleteTopic(topicId) {
      const userId = localStorage.getItem('userId');
      const accessToken = localStorage.getItem('accessToken');
      
      // Show loading state
      const deleteButton = document.getElementById('deleteTopic');
      deleteButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Deleting...';
      deleteButton.disabled = true;
      
      try {
        console.log(`Sending request to delete topic ${topicId}`);
        const response = await fetch('/.netlify/functions/dashboard', {
          method: 'POST',
          body: JSON.stringify({
            action: 'deleteTopic',
            userId,
            topicId
          }),
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${accessToken}`
          }
        });
        
        const result = await response.json();
        console.log('Delete response:', result);
        
        if (response.ok) {
          // Success animation
          deleteButton.innerHTML = '<i class="fas fa-check"></i> Deleted!';
          deleteButton.classList.add('success');
          
          // Modal exit animation with delay
          setTimeout(() => {
            const modal = document.getElementById('topicModal');
            const closeModal = document.querySelector('.close-modal');
            if (closeModal) {
              closeModal.click();
            } else if (modal) {
              modal.classList.remove('active');
            }
            showToast('Topic and all related data deleted successfully', 'success');
            loadTopics(); // Refresh the topics list
          }, 1000);
        } else {
          // Error handling with more detailed feedback
          deleteButton.innerHTML = '<i class="fas fa-trash"></i> Delete Topic';
          deleteButton.disabled = false;
          deleteButton.classList.remove('success');
          
          let errorMsg = 'Failed to delete topic';
          if (result.error) {
            errorMsg += `: ${result.error}`;
          }
          
          console.error('Error deleting topic:', errorMsg);
          showToast(errorMsg, 'error');
        }
      } catch (error) {
        console.error('Error deleting topic:', error);
        deleteButton.innerHTML = '<i class="fas fa-trash"></i> Delete Topic';
        deleteButton.disabled = false;
        deleteButton.classList.remove('success');
        showToast('Error connecting to server. Please try again.', 'error');
      }
    }

    // Open topic modal function
    async function openTopicModal(topicId) {
      console.log('Opening topic modal for:', topicId);
      
      const userId = localStorage.getItem('userId');
      const accessToken = localStorage.getItem('accessToken');
      
      if (!userId || !accessToken) {
      window.location.href = '/';
        return;
      }
      
      const topicModal = document.getElementById('topicModal');

    // Toast notification
    function showToast(message, type = 'info') {
      const toastContainer = document.querySelector('.toast-container') || createToastContainer();
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      const icon = type === 'success' ? 'fa-check-circle' : 
                  type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
      
      toast.innerHTML = `
        <i class="fas ${icon}"></i>
        <span>${message}</span>
        <button class="close-toast"><i class="fas fa-times"></i></button>
      `;
      
      toastContainer.appendChild(toast);
      
      // Animation timing
      setTimeout(() => {
        toast.classList.add('active');
      }, 10);
      
      const closeToast = toast.querySelector('.close-toast');
      closeToast.addEventListener('click', () => {
        toast.classList.add('toast-closing');
        setTimeout(() => {
          toast.remove();
          if (toastContainer.children.length === 0) {
            toastContainer.remove();
          }
        }, 300);
      });
      
      // Auto close after 4 seconds
      setTimeout(() => {
        if (document.body.contains(toast)) {
          toast.classList.add('toast-closing');
          setTimeout(() => {
            if (document.body.contains(toast)) {
              toast.remove();
              if (toastContainer.children.length === 0) {
                toastContainer.remove();
              }
            }
          }, 300);
        }
      }, 4000);
    }

      const container = document.createElement('div');
      container.className = 'toast-container';
      document.body.appendChild(container);
      return container;
    }

    // Add this markdown parsing function before any other code
    function parseMarkdown(markdown) {
      if (!markdown) return '';
      
      // Process code blocks first
      let html = markdown.replace(/```([^`]+)```/g, '<pre><code>$1</code></pre>');
      
      // Process inline code
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      
      // Replace headers
      html = html
        .replace(/### (.*?)(\n|$)/g, '<h3>$1</h3>')
        .replace(/## (.*?)(\n|$)/g, '<h2>$1</h2>')
        .replace(/# (.*?)(\n|$)/g, '<h1>$1</h1>');
      
      // Replace bold
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      
      // Replace italic
      html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
      
      // Replace bullet lists
      html = html.replace(/^\s*[\-\*]\s+(.*?)$/gm, '<li>$1</li>');
      
      // Replace numbered lists
      html = html.replace(/^\s*\d+\.\s+(.*?)$/gm, '<li>$1</li>');
      
      // Group consecutive list items
      const listItemRegex = /<li>.*?<\/li>/g;
      const listItems = html.match(listItemRegex) || [];
      
      if (listItems.length > 0) {
        let currentList = '';
        let listType = 'ul'; // Default to unordered list
        
        for (let i = 0; i < listItems.length; i++) {
          const item = listItems[i];
          
          // If this is a numbered list item, switch to ol
          if (html.indexOf(item) > 0) {
            const beforeItem = html.substring(0, html.indexOf(item)).trim();
            const lastLine = beforeItem.split('\n').pop();
            if (lastLine.match(/^\s*\d+\.\s+/)) {
              listType = 'ol';
            }
          }
          
          currentList += item;
          
          // Replace the original item with a placeholder
          html = html.replace(item, `__LIST_ITEM_${i}__`);
        }
        
        // Replace consecutive placeholders with wrapped list
        let listPattern = '';
        for (let i = 0; i < listItems.length; i++) {
          listPattern += `__LIST_ITEM_${i}__`;
          
          // If next item isn't consecutive or this is the last item
          if (i === listItems.length - 1 || 
              html.indexOf(`__LIST_ITEM_${i}__`) + `__LIST_ITEM_${i}__`.length !== html.indexOf(`__LIST_ITEM_${i+1}__`)) {
            
            // Create the list wrapper
            const list = `<${listType}>${currentList}</${listType}>`;
            
            // Replace the pattern with the wrapped list
            html = html.replace(listPattern, list);
            
            // Reset for next list
            listPattern = '';
            currentList = '';
            listType = 'ul';
          }
        }
      }
      
      // Replace links
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      
      // Replace horizontal rules
      html = html.replace(/^\s*[\-\=]{3,}\s*$/gm, '<hr>');
      
      // Replace line breaks
      html = html.replace(/\n/g, '<br>');
      
      // Apply some basic styling to make it look nice
      html = `<div class="markdown-content">${html}</div>`;
      
      return html;
    }

    // Add some CSS for the markdown content
    const style = document.createElement('style');
    style.textContent = `
      .markdown-content {
        line-height: 1.6;
        color: #333;
      }
      .markdown-content h1 {

      }
      .markdown-content h3 {

        margin: 0.6rem 0;

      }
      .markdown-content ul, .markdown-content ol {
        margin: 0.5rem 0;
        padding-left: 2rem;
      }
      .markdown-content li {
        margin: 0.3rem 0;
      }
      .markdown-content code {
        background-color: #f0f0f0;

        font-size: 0.9em;
      }
      .markdown-content pre {
        background-color: #f5f5f5;
        padding: 1rem;
        border-radius: 5px;
        overflow-x: auto;
        margin: 1rem 0;
      }
      .markdown-content pre code {
        background-color: transparent;

      .markdown-content a {
        color: #4a54eb;

      }
      .markdown-content a:hover {

      .markdown-content hr {
        border: 0;
        border-top: 1px solid #eee;

      }
      .summary-timestamp {
        margin-top: 1rem;

        border-top: 1px solid #e0e0e0;
        color: #777;
        font-size: 0.85rem;
        text-align: right;
      }
    `;
    document.head.appendChild(style);
  </script>
